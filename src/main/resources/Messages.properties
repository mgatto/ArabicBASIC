# Header
usage.headerHeading = ArabicBASIC interpreter%n
usage.header   = This interpreter processes BASIC language wholly localized for Arabic usage.%n
#usage.header.0 = as input into ASCII art and prints them out.%n

# Description (Picocli: usage.description / usage.descriptionHeading)
usage.descriptionHeading.0 = %nSynopsis:%n
usage.description.0 = Runs an ArabicBASIC script file and prints results of computations to STDOUT.
#usage.description = This demo app demonstrates the use of localized%n

# Parameters
usage.parameterListHeading = Positional parameters:%n
fileParam = The file containing ArabicBASIC lines of code
#words.0 = Default: 'Hello, world!'

# Options
usage.optionListHeading = Options:%n
debug.0 = Print out the internal symbol table after running an  
debug.1 = ArabicBASIC script. Also print out the interpreter's
debug.2 = recursive progress while parsing an ArabicBASIC script.
version = Print the version of the ArabicBASIC interpreter
help = Show this help screen.
localeParam = Language tag for interpreter runtime error messages (e.g. en, en-US, ar). Default follows JVM locale after Arabic setup.
unicodeMapParam = Read input from file and print formatted Unicode mapping data only (interpreter is skipped).
replParam = Start interactive REPL mode. If no script file is provided, REPL starts automatically.

